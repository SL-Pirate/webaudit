<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Web Auditor</title>
    <style>
        :root {
            --bg-color: #0d0d12;
            --text-color: #e2e8f0;
            --accent-glow: rgba(99, 102, 241, 0.5);
            --accent-solid: #6366f1;
            --error-color: #ef4444;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 40px var(--accent-glow);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            font-weight: 300;
            letter-spacing: 2px;
        }

        p {
            color: #94a3b8;
            margin-bottom: 2.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            position: relative;
        }

        input[type="text"] {
            width: 100%;
            box-sizing: border-box;
            padding: 1rem 1.5rem;
            font-size: 1.1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-solid);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        button {
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 600;
            background-color: var(--accent-solid);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
        }

        button:hover {
            background-color: #4f46e5;
        }

        button:active {
            transform: scale(0.98);
        }

        .error-message {
            color: var(--error-color);
            font-size: 0.9rem;
            min-height: 20px; /* Prevents layout shift */
            margin-top: 0.5rem;
            text-align: left;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Aura.AI</h1>
    <p>Ethical insights for the modern web.</p>

    <form id="auditForm" action="/result" method="get">
        <div class="input-group">
            <!--suppress HtmlFormInputWithoutLabel -->
            <input
                    type="text"
                    id="urlInput"
                    name="url"
                    placeholder="https://your-website.com"
                    autocomplete="off"
            >
            <button type="submit">Commence Audit</button>
        </div>
        <div id="errorText" class="error-message"></div>
    </form>
</div>

<script>
    document.getElementById('auditForm').addEventListener('submit', function (event) {
        const urlInput = document.getElementById('urlInput').value.trim();
        const errorText = document.getElementById('errorText');

        // Clear previous errors
        errorText.textContent = '';

        if (!urlInput) {
            event.preventDefault();
            errorText.textContent = 'Please enter a URL.';
            return;
        }

        try {
            // The URL constructor is the most reliable way to validate a URL in JS
            const parsedUrl = new URL(urlInput);

            // Ensure the protocol is http or https
            if (parsedUrl.protocol !== 'http:' && parsedUrl.protocol !== 'https:') {
                event.preventDefault();
                errorText.textContent = 'URL must start with http:// or https://';
            }
        } catch (err) {
            // If the URL constructor throws an error, the URL is invalid
            event.preventDefault();
            errorText.textContent = 'Please enter a valid, fully qualified URL.';
        }
    });
</script>
</body>
</html>
